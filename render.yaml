services:
  - type: web
    name: telegaruda-ai
    env: docker
    plan: free # Higher plan recommended for rPPG processing
    region: oregon
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: RPPG_FPS
        value: "30"
      - key: RPPG_CORS_ORIGINS
        value: "*" # Change this to your frontend URL after deployment
      - key: PYTHONUNBUFFERED
        value: "1"
