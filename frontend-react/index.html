<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="TeleGaruda AI — Clinical-grade remote photoplethysmography (rPPG) vital signs monitor using AI facial video analysis. Measure heart rate, blood pressure, SpO2, HRV, and more contactlessly." />
  <meta name="theme-color" content="#f8fafc" />

  <!-- Security meta tags -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />

  <!-- SEO -->
  <meta name="robots" content="index, follow" />
  <meta property="og:title" content="TeleGaruda AI — Contactless Vital Sign Monitor" />
  <meta property="og:description"
    content="AI-powered facial video analysis to measure vitals in 40 seconds. Heart Rate, Blood Pressure, SpO2, HRV, and more." />
  <meta property="og:type" content="website" />

  <title>TeleGaruda AI — Clinical Dashboard</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫀</text></svg>" />

  <!-- Fonts: preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!-- React root -->
  <div id="root"></div>

  <!-- Noscript fallback -->
  <noscript>
    <div style="padding: 2rem; text-align: center; font-family: Inter, sans-serif;">
      <h1>JavaScript Required</h1>
      <p>TeleGaruda AI requires JavaScript to function. Please enable JavaScript in your browser settings.</p>
    </div>
  </noscript>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
